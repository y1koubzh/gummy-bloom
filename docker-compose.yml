services:
  mysql:
    image: mysql:8.4
    container_name: gummy-bloom-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gummy_bloom
      MYSQL_USER: gummy
      MYSQL_PASSWORD: gummy_pass
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - gummy_mysql_data:/var/lib/mysql

volumes:
  gummy_mysql_data:
